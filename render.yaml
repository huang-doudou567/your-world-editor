services:
  - type: web
    name: your-world-editor-api
    env: node
    rootDir: web
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: SERVER_PORT
        value: "10000"
